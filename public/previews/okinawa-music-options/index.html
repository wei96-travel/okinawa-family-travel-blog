<body><main>
  <h1>沖繩親子短片｜配樂試聽</h1>
  <p class="lead">參考沖繩旅行 Vlog 常見的清新木吉他、海風 Chill 與淡三線風格。四首都裁成 25 秒並統一音量。</p>
  <section class="card"><h2>A｜日系清新</h2><p class="tag">木吉他為主，輕鬆、自然，不刻意煽情。</p><audio controls preload="metadata" src="/previews/okinawa-music-options/music-a.mp3"></audio></section>
  <section class="card"><h2>B｜日系生活感</h2><p class="tag">比較有 Vlog 節奏，溫暖但不悲情。</p><audio controls preload="metadata" src="/previews/okinawa-music-options/music-b.mp3"></audio></section>
  <section class="card"><h2>C｜沖繩海風</h2><p class="tag">加入淡淡三線質感，島嶼特色比較明顯。</p><audio controls preload="metadata" src="/previews/okinawa-music-options/music-c.mp3"></audio></section>
  <section class="card"><h2>D｜海島 Chill</h2><p class="tag">三線較淡、節奏較鬆，適合慢一點的輪播。</p><audio controls preload="metadata" src="/previews/okinawa-music-options/music-d.mp3"></audio></section>
  <p class="note">先回覆 A、B、C 或 D。我再把你選的版本正式換進 18 秒短片。</p>
