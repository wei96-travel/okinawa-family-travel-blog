<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>沖繩租車安全座椅｜輪播預覽</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #292522;
        background: #efede9;
        font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      }

      header {
        padding: 20px 18px 14px;
        text-align: center;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        line-height: 1.4;
      }

      p {
        margin: 0;
        color: #6b625c;
        font-size: 14px;
      }

      main {
        width: min(100%, 620px);
        margin: 0 auto;
        padding: 0 12px 32px;
      }

      figure {
        margin: 0 0 18px;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        background: #191614;
      }

      figcaption {
        padding: 8px 2px 0;
        color: #6b625c;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>沖繩租車安全座椅</h1>
      <p>Facebook 輪播預覽，共 6 張</p>
    </header>
    <main>
      <figure><img src="01.png" alt="輪播第 1 張：沖繩租車安全座椅不是有就好" /><figcaption>第 1 張</figcaption></figure>
      <figure><img src="02.png" alt="輪播第 2 張：未滿六歲依法要使用安全座椅" /><figcaption>第 2 張</figcaption></figure>
      <figure><img src="03.png" alt="輪播第 3 張：訂車時提供年齡身高體重" /><figcaption>第 3 張</figcaption></figure>
      <figure><img src="04.png" alt="輪播第 4 張：三種座椅都要看標示" /><figcaption>第 4 張</figcaption></figure>
      <figure><img src="05.png" alt="輪播第 5 張：取車現場再次確認" /><figcaption>第 5 張</figcaption></figure>
      <figure><img src="06.png" alt="輪播第 6 張：先收藏訂車時再看" /><figcaption>第 6 張</figcaption></figure>
    </main>

</html>
