<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>沖繩租車安全座椅</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; }
  .artboard {
    position: relative;
    width: 1080px;
    height: 1350px;
    background-image: url('https://images.pexels.com/photos/6182086/pexels-photo-6182086.jpeg');
    background-size: cover;
    background-position: left center;
    background-repeat: no-repeat;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    overflow: hidden;
  }
  .overlay {
    position: absolute;
    inset: 0 auto 0 0;
    width: 66%;
    background: linear-gradient(to right, rgba(35,20,12,.72) 0%, rgba(35,20,12,.55) 35%, rgba(35,20,12,.25) 70%, rgba(35,20,12,0) 100%);
  }
  .label { position: absolute; top: 76px; left: 76px; font-size: 28px; font-weight: 700; color: #f5efe6; letter-spacing: 1px; }
  .title { position: absolute; left: 76px; top: 320px; width: 560px; height: 330px; display: flex; flex-direction: column; justify-content: center; font-size: 92px; font-weight: 900; line-height: 1.28; color: #faf5ea; }
  .title .highlight { color: #f2c14e; }
  .subtitle { position: absolute; left: 76px; top: 1080px; width: 620px; font-size: 36px; font-weight: 700; color: #f5efe6; line-height: 1.4; }
</style>
</head>
<body>
  <div class="artboard">
    <div class="overlay"></div>
    <div class="label">第一次帶小孩去沖繩</div>
    <div class="title">沖繩租車<br><span class="highlight">安全座椅</span><br>怎麼選？</div>
    <div class="subtitle">預約前先確認年齡、身高和體重</div>
  </div>
</body>
</html>
