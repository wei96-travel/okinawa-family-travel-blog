<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#17130f" />
    <title>沖繩北部親子一日遊｜輪播預覽</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #17130f;
        --panel: #231d18;
        --text: #f7f0e5;
        --muted: #b9aa99;
        --gold: #d9a557;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(217, 165, 87, 0.12), transparent 34rem),
          var(--bg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      }

      header {
        width: min(100% - 32px, 1180px);
        margin: 0 auto;
        padding: 34px 0 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        padding: 6px 11px;
        border: 1px solid rgba(217, 165, 87, 0.46);
        border-radius: 999px;
        color: var(--gold);
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-family: "Noto Serif TC", "Songti TC", serif;
        font-size: clamp(26px, 4vw, 42px);
        line-height: 1.25;
      }

      header p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      main {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
        width: min(100% - 32px, 1180px);
        margin: 0 auto;
        padding: 0 0 50px;
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
      }

      a { display: block; }

      img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 5;
        object-fit: cover;
      }

      figcaption {
        padding: 11px 14px 13px;
        color: var(--muted);
        font-size: 13px;
      }

      footer {
        padding: 0 16px 36px;
        color: #8f8173;
        text-align: center;
        font-size: 12px;
      }

      @media (max-width: 860px) {
        main { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 560px) {
        header { width: min(100% - 24px, 520px); padding-top: 24px; }
        main {
          grid-template-columns: 1fr;
          width: min(100% - 24px, 520px);
          gap: 18px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="badge">未發布預覽</div>
      <h1>沖繩北部親子一日遊</h1>
      <p>第一組 6 張 FB／IG 輪播。點一下圖片可開啟原尺寸檢查。</p>
    </header>

    <main>
      <figure><a href="01.png"><img src="01.png" alt="沖繩北部親子一日遊輪播第 1 張" /></a><figcaption>01／封面</figcaption></figure>
      <figure><a href="02.png"><img src="02.png" alt="沖繩北部親子一日遊輪播第 2 張" loading="lazy" /></a><figcaption>02／路線安排</figcaption></figure>
      <figure><a href="03.png"><img src="03.png" alt="沖繩北部親子一日遊輪播第 3 張" loading="lazy" /></a><figcaption>03／親子行前準備</figcaption></figure>
      <figure><a href="04.png"><img src="04.png" alt="沖繩北部親子一日遊輪播第 4 張" loading="lazy" /></a><figcaption>04／美麗海水族館</figcaption></figure>
      <figure><a href="05.png"><img src="05.png" alt="沖繩北部親子一日遊輪播第 5 張" loading="lazy" /></a><figcaption>05／古宇利島</figcaption></figure>
      <figure><a href="06.png"><img src="06.png" alt="沖繩北部親子一日遊輪播第 6 張" loading="lazy" /></a><figcaption>06／回程提醒</figcaption></figure>
    </main>

    <footer>僅供版面確認，尚未發布至 Facebook 或 Instagram。</footer>
  </body>
</html>
