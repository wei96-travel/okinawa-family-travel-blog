<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1270" viewBox="0 0 1080 1270" role="img" aria-labelledby="t d">
  <title id="t">沖繩租車要帶的三樣證件</title>
  <desc id="d">台灣人在日本開車需要護照、台灣駕照正本與駕照日文譯本三樣，缺一不可；台灣核發的國際駕照在日本無法使用。</desc>

  <rect width="1080" height="1270" fill="#f7f5ef"/>

  <text x="60" y="88" fill="#24343b" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="52" font-weight="700">沖繩租車，這三樣缺一不可</text>
  <text x="60" y="136" fill="#5d6b70" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="28">台灣人在日本開車的證件組合。</text>

  <!-- ============ 三份證件圖示 ============ -->

  <!-- 1 護照 -->
  <g transform="translate(60 190)">
    <rect width="300" height="420" rx="12" fill="#fff" stroke="#c8d9d1" stroke-width="3"/>

    <!-- 護照本體 -->
    <g transform="translate(78 46)">
      <rect x="6" y="8" width="144" height="196" rx="12" fill="#2f5f4e" opacity=".18"/>
      <rect width="144" height="196" rx="12" fill="#35705a"/>
      <rect x="10" y="6" width="8" height="184" rx="4" fill="#2a5c48"/>
      <circle cx="76" cy="72" r="26" fill="none" stroke="#cfe3d8" stroke-width="4"/>
      <circle cx="76" cy="72" r="12" fill="#cfe3d8" opacity=".6"/>
      <rect x="40" y="120" width="72" height="9" rx="4" fill="#cfe3d8" opacity=".85"/>
      <rect x="52" y="142" width="48" height="8" rx="4" fill="#cfe3d8" opacity=".6"/>
    </g>

    <circle cx="46" cy="46" r="26" fill="#eef4f1" stroke="#4f8a72" stroke-width="3"/>
    <text x="46" y="57" fill="#35705a" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="28" font-weight="700">1</text>

    <text x="150" y="306" fill="#24343b" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="38" font-weight="700">護照</text>
    <text x="150" y="350" fill="#33464d" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25">確認身分與入境日期</text>
    <text x="150" y="386" fill="#35705a" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23">互惠適用入境後一年內</text>
  </g>

  <!-- 2 台灣駕照 -->
  <g transform="translate(390 190)">
    <rect width="300" height="420" rx="12" fill="#fff" stroke="#c8d9d1" stroke-width="3"/>

    <!-- 駕照卡片 -->
    <g transform="translate(38 84)">
      <rect x="6" y="8" width="224" height="140" rx="10" fill="#8a7a5e" opacity=".18"/>
      <rect width="224" height="140" rx="10" fill="#f2ead9" stroke="#c9b79c" stroke-width="3"/>
      <rect y="0" width="224" height="26" rx="10" fill="#d99039"/>
      <rect y="16" width="224" height="10" fill="#d99039"/>
      <!-- 大頭照位置，留空不畫臉 -->
      <rect x="18" y="44" width="58" height="72" rx="6" fill="#e2d5c0" stroke="#c9b79c" stroke-width="2"/>
      <circle cx="47" cy="70" r="13" fill="#cbbba1"/>
      <path d="M28 112 q19 -22 38 0 z" fill="#cbbba1"/>
      <rect x="92" y="48" width="112" height="9" rx="4" fill="#c9b79c"/>
      <rect x="92" y="70" width="86" height="9" rx="4" fill="#d7c8b0"/>
      <rect x="92" y="92" width="104" height="9" rx="4" fill="#d7c8b0"/>
    </g>

    <circle cx="46" cy="46" r="26" fill="#eef4f1" stroke="#4f8a72" stroke-width="3"/>
    <text x="46" y="57" fill="#35705a" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="28" font-weight="700">2</text>

    <text x="150" y="306" fill="#24343b" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="38" font-weight="700">台灣駕照正本</text>
    <text x="150" y="350" fill="#33464d" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25">譯本只是翻譯</text>
    <text x="150" y="386" fill="#a85f18" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23">別只帶譯本、把駕照留家裡</text>
  </g>

  <!-- 3 日文譯本 -->
  <g transform="translate(720 190)">
    <rect width="300" height="420" rx="12" fill="#fff" stroke="#c8d9d1" stroke-width="3"/>

    <!-- 譯本紙張 -->
    <g transform="translate(86 44)">
      <rect x="6" y="8" width="128" height="180" rx="6" fill="#8a8f8c" opacity=".16"/>
      <rect width="128" height="180" rx="6" fill="#ffffff" stroke="#c2ccc7" stroke-width="3"/>
      <line x1="0" y1="92" x2="128" y2="92" stroke="#dde4e0" stroke-width="3"/>
      <rect x="22" y="26" width="84" height="10" rx="5" fill="#4f8fb2"/>
      <rect x="22" y="50" width="62" height="7" rx="3.5" fill="#cdd7dc"/>
      <rect x="22" y="66" width="76" height="7" rx="3.5" fill="#cdd7dc"/>
      <rect x="22" y="108" width="70" height="7" rx="3.5" fill="#cdd7dc"/>
      <rect x="22" y="124" width="54" height="7" rx="3.5" fill="#cdd7dc"/>
      <circle cx="96" cy="146" r="20" fill="none" stroke="#b4552f" stroke-width="4" opacity=".75"/>
      <circle cx="96" cy="146" r="9" fill="#b4552f" opacity=".35"/>
    </g>

    <circle cx="46" cy="46" r="26" fill="#eef4f1" stroke="#4f8a72" stroke-width="3"/>
    <text x="46" y="57" fill="#35705a" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="28" font-weight="700">3</text>

    <text x="150" y="306" fill="#24343b" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="38" font-weight="700">駕照日文譯本</text>
    <text x="150" y="350" fill="#33464d" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25">監理站或線上申辦</text>
    <text x="150" y="386" fill="#35705a" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23">規費 100 元｜自行翻譯無效</text>
  </g>

  <!-- 加號連接，表達三者要一起帶 -->
  <g fill="#a8b5b0">
    <rect x="366" y="380" width="20" height="5" rx="2.5"/>
    <rect x="373.5" y="372.5" width="5" height="20" rx="2.5"/>
    <rect x="696" y="380" width="20" height="5" rx="2.5"/>
    <rect x="703.5" y="372.5" width="5" height="20" rx="2.5"/>
  </g>

  <!-- ============ 國際駕照不能用 ============ -->
  <g transform="translate(60 650)">
    <rect width="960" height="230" rx="12" fill="#fbeee7" stroke="#e0b49c" stroke-width="3"/>

    <!-- 打叉的國際駕照 -->
    <g transform="translate(48 46)">
      <rect width="118" height="150" rx="8" fill="#e6d3c8"/>
      <rect x="8" y="4" width="7" height="142" rx="3.5" fill="#d6bcae"/>
      <rect x="34" y="34" width="62" height="9" rx="4.5" fill="#c6a795"/>
      <rect x="34" y="56" width="46" height="8" rx="4" fill="#d3b8a8"/>
      <rect x="34" y="98" width="58" height="8" rx="4" fill="#d3b8a8"/>
      <g stroke="#b4552f" stroke-width="11" stroke-linecap="round">
        <line x1="14" y1="18" x2="104" y2="132"/>
        <line x1="104" y1="18" x2="14" y2="132"/>
      </g>
    </g>

    <text x="212" y="86" fill="#8c3f20" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="40" font-weight="700">台灣的國際駕照，在日本無法使用</text>
    <text x="212" y="134" fill="#8c3f20" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="27">台灣非《日內瓦道路交通公約》締約方，</text>
    <text x="212" y="172" fill="#8c3f20" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="27">帶了也不能取代日文譯本。</text>
  </g>

  <!-- ============ 忘記帶 ============ -->
  <g transform="translate(60 910)">
    <rect width="960" height="200" rx="12" fill="#fff" stroke="#b9d5e5" stroke-width="3"/>

    <!-- 日曆圖示，表達要等 2-3 天 -->
    <g transform="translate(50 44)">
      <rect width="118" height="112" rx="10" fill="#eef5f9" stroke="#4f8fb2" stroke-width="4"/>
      <rect width="118" height="30" rx="10" fill="#4f8fb2"/>
      <rect y="20" width="118" height="10" fill="#4f8fb2"/>
      <rect x="24" y="-8" width="10" height="24" rx="5" fill="#357895"/>
      <rect x="84" y="-8" width="10" height="24" rx="5" fill="#357895"/>
      <text x="59" y="88" fill="#357895" text-anchor="middle" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="46" font-weight="700">2-3</text>
    </g>

    <text x="212" y="76" fill="#24343b" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="35" font-weight="700">忘記帶？在日本可向 JAF 線上申請</text>
    <text x="212" y="122" fill="#357895" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="27">台灣屬優先處理，平均仍要 2 到 3 個工作天，</text>
    <text x="212" y="158" fill="#357895" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="27">當天取車通常來不及。</text>
  </g>

  <text x="60" y="1176" fill="#718087" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="24">資料整理自交通部公路局與 JAF，規費與規定以官方最新公告為準</text>
  <text x="60" y="1212" fill="#718087" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="24">圖為示意，非實際證件外觀｜okinawafamilynotes.com</text>
</svg>
