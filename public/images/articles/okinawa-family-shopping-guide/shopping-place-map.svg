<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">沖繩親子購物點分工</title>
  <desc id="desc">大型商場負責一次處理多種需求，國際通負責散步與沖繩土產，超市負責回飯店前的日常補給。</desc>
  <rect width="1200" height="720" fill="#f7f4ef"/>
  <text x="72" y="82" fill="#2f2b27" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="42" font-weight="700">先想今天要完成什麼，再決定去哪裡</text>
  <text x="72" y="126" fill="#70675f" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="23">三種購物點不用全部跑一遍</text>

  <rect x="72" y="180" width="328" height="388" rx="8" fill="#e3efe9" stroke="#aac8b7" stroke-width="2"/>
  <circle cx="122" cy="230" r="25" fill="#28745b"/>
  <text x="122" y="239" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">1</text>
  <text x="160" y="240" fill="#234e3e" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="31" font-weight="700">大型商場</text>
  <text x="104" y="306" fill="#2f2b27" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25" font-weight="700">一次處理全家的需求</text>
  <text x="104" y="356" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・雨天備案</text>
  <text x="104" y="398" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・用品、餐廳、超市</text>
  <text x="104" y="440" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・先約好離開時間</text>
  <rect x="104" y="490" width="264" height="48" rx="4" fill="#ffffff"/>
  <text x="236" y="521" text-anchor="middle" fill="#28745b" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="19" font-weight="700">適合下午到晚餐前</text>

  <rect x="436" y="180" width="328" height="388" rx="8" fill="#e7edf5" stroke="#adc0d6" stroke-width="2"/>
  <circle cx="486" cy="230" r="25" fill="#3f648c"/>
  <text x="486" y="239" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">2</text>
  <text x="524" y="240" fill="#304e70" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="31" font-weight="700">國際通</text>
  <text x="468" y="306" fill="#2f2b27" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25" font-weight="700">散步、吃飯、挑土產</text>
  <text x="468" y="356" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・想送人的伴手禮</text>
  <text x="468" y="398" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・工藝品與紀念品</text>
  <text x="468" y="440" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・自駕先查停車管制</text>
  <rect x="468" y="490" width="264" height="48" rx="4" fill="#ffffff"/>
  <text x="600" y="521" text-anchor="middle" fill="#3f648c" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="19" font-weight="700">適合住那霸的傍晚</text>

  <rect x="800" y="180" width="328" height="388" rx="8" fill="#f5e7df" stroke="#d7b8a5" stroke-width="2"/>
  <circle cx="850" cy="230" r="25" fill="#9b5f3f"/>
  <text x="850" y="239" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">3</text>
  <text x="888" y="240" fill="#74462f" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="31" font-weight="700">在地超市</text>
  <text x="832" y="306" fill="#2f2b27" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="25" font-weight="700">回飯店前補生活</text>
  <text x="832" y="356" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・早餐、飲料、熟食</text>
  <text x="832" y="398" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・少量零食與用品</text>
  <text x="832" y="440" fill="#4e4944" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="22">・不拿長清單硬找</text>
  <rect x="832" y="490" width="264" height="48" rx="4" fill="#ffffff"/>
  <text x="964" y="521" text-anchor="middle" fill="#9b5f3f" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="19" font-weight="700">適合回飯店前 30 分鐘</text>

  <line x1="72" y1="620" x2="1128" y2="620" stroke="#d6cec3" stroke-width="2"/>
  <text x="600" y="668" text-anchor="middle" fill="#574f47" font-family="Noto Sans TC, Microsoft JhengHei, sans-serif" font-size="24" font-weight="700">一天一個主要購物點，孩子比較不用一直等</text>
</svg>
