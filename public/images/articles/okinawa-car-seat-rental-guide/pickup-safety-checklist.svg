<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100" role="img" aria-labelledby="title desc">
  <title id="title">租車取車時的安全座椅六項檢查</title>
  <desc id="desc">依序核對座椅類型、查看身高體重與方向標示、優先安裝在後座、檢查安全帶或 ISOFIX 固定、讓孩子實際試坐，以及確認夏天扣具不會燙傷。</desc>
  <rect width="800" height="1100" fill="#fffdf8"/>
  <rect x="36" y="30" width="728" height="1040" rx="20" fill="#ffffff" stroke="#eadfce" stroke-width="2"/>

  <g font-family="system-ui, -apple-system, 'Segoe UI', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif" fill="#34302b">
    <text x="70" y="86" font-size="24" font-weight="700" fill="#9a6b43">取車先別急著開走</text>
    <text x="70" y="137" font-size="43" font-weight="700">安全座椅 6 項現場確認</text>
    <text x="70" y="178" font-size="23" fill="#756e65">每一項都看過，再帶孩子上路</text>

    <g transform="translate(70 215)">
      <rect width="660" height="116" rx="8" fill="#eef6fb" stroke="#b9d6e7" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#3f7fa3"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
      <text x="102" y="49" font-size="31" font-weight="700">核對座椅類型</text>
      <text x="102" y="84" font-size="24" fill="#5f6f79">嬰兒型、幼兒型或學童型</text>
    </g>

    <g transform="translate(70 346)">
      <rect width="660" height="116" rx="8" fill="#fff8e7" stroke="#ead8a4" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#b48212"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
      <text x="102" y="49" font-size="31" font-weight="700">查看使用標示</text>
      <text x="102" y="84" font-size="24" fill="#75683f">身高、體重與安裝方向都要合用</text>
    </g>

    <g transform="translate(70 477)">
      <rect width="660" height="116" rx="8" fill="#f2f8f4" stroke="#bfd9c8" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#43835e"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
      <text x="102" y="49" font-size="31" font-weight="700">優先安裝在後座</text>
      <text x="102" y="84" font-size="24" fill="#587263">後向座椅要避開副駕安全氣囊</text>
    </g>

    <g transform="translate(70 608)">
      <rect width="660" height="116" rx="8" fill="#f8f3ee" stroke="#dfccb7" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#9a6b43"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
      <text x="102" y="49" font-size="31" font-weight="700">檢查固定方式</text>
      <text x="102" y="84" font-size="24" fill="#756e65">安全帶或 ISOFIX 依說明固定</text>
    </g>

    <g transform="translate(70 739)">
      <rect width="660" height="116" rx="8" fill="#f7f2fa" stroke="#d7c8df" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#78608b"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
      <text x="102" y="49" font-size="31" font-weight="700">讓孩子實際試坐</text>
      <text x="102" y="84" font-size="24" fill="#6f6276">肩帶不扭轉，扣具確實扣好</text>
    </g>

    <g transform="translate(70 870)">
      <rect width="660" height="116" rx="8" fill="#fff3ed" stroke="#eccbbc" stroke-width="2"/>
      <circle cx="50" cy="58" r="30" fill="#b96542"/>
      <text x="50" y="68" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
      <text x="102" y="49" font-size="31" font-weight="700">摸一下扣具溫度</text>
      <text x="102" y="84" font-size="24" fill="#7c6257">沖繩夏天上車前先確認不燙</text>
    </g>

    <rect x="70" y="1012" width="660" height="34" rx="8" fill="#f7eee4"/>
    <text x="400" y="1036" font-size="19" font-weight="700" fill="#694624" text-anchor="middle">不確定就先問門市，確認完成再離開停車場</text>
  </g>
</svg>
