<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">沖繩租車安全座椅三種類型</title>
  <desc id="desc">嬰兒型以後向安裝為主，幼兒型依產品條件轉為前向，學童型協助成人安全帶落在正確位置。年齡只當參考，預約時要提供身高與體重。</desc>
  <rect width="1200" height="675" fill="#fffdf8"/>
  <rect x="48" y="42" width="1104" height="591" rx="24" fill="#ffffff" stroke="#eadfce" stroke-width="2"/>

  <g font-family="system-ui, -apple-system, 'Segoe UI', 'Noto Sans TC', sans-serif" fill="#34302b">
    <text x="600" y="108" font-size="48" font-weight="700" text-anchor="middle">安全座椅先分這三型</text>
    <text x="600" y="151" font-size="25" fill="#756e65" text-anchor="middle">預約時直接提供孩子的年齡、身高和體重</text>

    <g transform="translate(84 190)">
      <rect width="320" height="276" rx="16" fill="#eef6fb" stroke="#3f7fa3" stroke-width="3"/>
      <g transform="translate(96 35)" fill="none" stroke="#3f7fa3" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M38 12c48 0 78 34 78 79v73H38c-24 0-38-19-38-43V55C0 31 14 12 38 12z"/>
        <circle cx="50" cy="64" r="17"/>
        <path d="M37 89c18 15 34 20 57 20"/>
      </g>
      <text x="160" y="190" font-size="39" font-weight="700" text-anchor="middle">嬰兒型</text>
      <text x="160" y="231" font-size="29" text-anchor="middle">以後向安裝為主</text>
      <text x="160" y="260" font-size="21" fill="#5e7180" text-anchor="middle">先確認是否適合新生兒</text>
    </g>

    <g transform="translate(440 190)">
      <rect width="320" height="276" rx="16" fill="#fff8e7" stroke="#c59622" stroke-width="3"/>
      <g transform="translate(100 34)" fill="none" stroke="#a87a0e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 18h76c12 0 22 10 22 22v116H22C10 156 0 146 0 134V40c0-12 10-22 22-22z"/>
        <circle cx="60" cy="60" r="17"/>
        <path d="M38 87l22 24 23-24M60 111v34"/>
      </g>
      <text x="160" y="190" font-size="39" font-weight="700" text-anchor="middle">幼兒型</text>
      <text x="160" y="231" font-size="29" text-anchor="middle">依產品條件轉前向</text>
      <text x="160" y="260" font-size="21" fill="#77683f" text-anchor="middle">月齡、身高與體重都要看</text>
    </g>

    <g transform="translate(796 190)">
      <rect width="320" height="276" rx="16" fill="#f2f8f4" stroke="#43835e" stroke-width="3"/>
      <g transform="translate(98 32)" fill="none" stroke="#43835e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 4h84c12 0 20 8 20 20v130H0V24C0 12 8 4 20 4z"/>
        <circle cx="62" cy="49" r="16"/>
        <path d="M31 78h62M36 78l26 31 25-31M62 109v37"/>
      </g>
      <text x="160" y="190" font-size="39" font-weight="700" text-anchor="middle">學童型</text>
      <text x="160" y="231" font-size="29" text-anchor="middle">調整成人安全帶位置</text>
      <text x="160" y="260" font-size="21" fill="#587263" text-anchor="middle">約到 150 公分仍需判斷</text>
    </g>

    <g transform="translate(84 502)">
      <rect width="1032" height="78" rx="14" fill="#f7eee4" stroke="#dfccb7" stroke-width="2"/>
      <text x="516" y="49" font-size="28" font-weight="700" text-anchor="middle">年齡只當參考，最後以租借品標示和孩子身形為準</text>
    </g>
  </g>
</svg>
