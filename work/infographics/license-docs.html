<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>沖繩租車三樣證件</title>
<style>
  :root {
    --forest: #173f3b;
    --forest-soft: #2f6b60;
    --paper: #f7f8f4;
    --white: #ffffff;
    --ink: #182a2b;
    --body: #526060;
    --line: #d7dfd9;
    --red: #b84c37;
    --yellow: #f0bd4e;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    width: 1080px;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
  }

  .sheet {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: var(--paper);
  }

  .hero {
    position: relative;
    height: 530px;
    padding: 70px 76px 64px;
    color: var(--white);
    background: var(--forest);
  }

  .hero::after {
    content: "";
    position: absolute;
    left: 76px;
    right: 76px;
    bottom: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.2);
  }

  .kicker {
    font-size: 27px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #c7d9d3;
  }

  .headline {
    margin-top: 54px;
    font-size: 72px;
    font-weight: 800;
    line-height: 1.28;
  }

  .wrong,
  .right {
    display: inline-block;
    position: relative;
  }

  .wrong {
    color: #f3c8bf;
  }

  .wrong::after {
    content: "";
    position: absolute;
    left: -4px;
    right: -4px;
    top: 53%;
    height: 8px;
    border-radius: 6px;
    background: var(--red);
    transform: rotate(-3deg);
  }

  .right {
    color: #ffffff;
  }

  .right::before {
    content: "✓";
    display: inline-flex;
    width: 62px;
    height: 62px;
    margin-right: 20px;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: var(--forest);
    background: var(--yellow);
    font-size: 39px;
    line-height: 1;
    vertical-align: 10px;
  }

  .hero-note {
    margin-top: 38px;
    max-width: 860px;
    color: #d8e5e0;
    font-size: 28px;
    line-height: 1.65;
  }

  .documents {
    padding: 54px 76px 36px;
  }

  .section-label {
    font-size: 25px;
    font-weight: 700;
    color: var(--forest-soft);
    letter-spacing: 0.08em;
  }

  .section-title {
    margin-top: 14px;
    font-size: 43px;
    font-weight: 800;
    line-height: 1.35;
  }

  .document-list {
    margin-top: 42px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
  }

  .document {
    min-height: 235px;
    padding: 34px 28px 30px;
    border-right: 1px solid var(--line);
  }

  .document:last-child {
    border-right: 0;
  }

  .number {
    display: flex;
    width: 50px;
    height: 50px;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--forest);
    color: var(--white);
    font-size: 26px;
    font-weight: 800;
  }

  .document h2 {
    margin-top: 24px;
    font-size: 34px;
    line-height: 1.3;
  }

  .document p {
    margin-top: 12px;
    color: var(--body);
    font-size: 23px;
    line-height: 1.45;
  }

  .reminder {
    margin: 0 76px;
    padding: 34px 38px;
    border-left: 8px solid var(--yellow);
    background: #e9f0eb;
  }

  .reminder strong {
    display: block;
    font-size: 29px;
    line-height: 1.45;
  }

  .reminder p {
    margin-top: 10px;
    color: var(--body);
    font-size: 24px;
    line-height: 1.5;
  }

  .footer {
    margin: 25px 76px 0;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: #73807d;
    font-size: 19px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<main class="sheet">
  <section class="hero">
    <p class="kicker">台灣人到沖繩租車</p>
    <h1 class="headline">
      <span class="wrong">國際駕照</span>不行<br>
      要帶<span class="right">日文譯本</span>
    </h1>
    <p class="hero-note">
      日本不承認台灣核發的國際駕照。取車時，護照、台灣駕照正本和日文譯本要一起帶。
    </p>
  </section>

  <section class="documents">
    <p class="section-label">取車櫃檯會用到</p>
    <h2 class="section-title">出發前，把這三樣放在同一個資料夾</h2>

    <div class="document-list">
      <article class="document">
        <span class="number">1</span>
        <h2>護照</h2>
        <p>確認本人身分</p>
      </article>
      <article class="document">
        <span class="number">2</span>
        <h2>台灣駕照<br>正本</h2>
        <p>影本不能代替</p>
      </article>
      <article class="document">
        <span class="number">3</span>
        <h2>駕照<br>日文譯本</h2>
        <p>和正本一起使用</p>
      </article>
    </div>
  </section>

  <aside class="reminder">
    <strong>還沒申請？監理站臨櫃約 1 小時，規費 100 元。</strong>
    <p>人在日本才發現沒帶，JAF 線上申請約需 2～3 個工作天，當天取車通常來不及。</p>
  </aside>

  <footer class="footer">
    資料來源：交通部公路局、監理服務網與 JAF｜規定與規費以官方最新公告為準｜okinawafamilynotes.com
  </footer>
</main>
</body>
</html>
